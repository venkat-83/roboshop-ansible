- name: roboshop instances management
  hosts: local
  connection: local
  vars: 
    instances: ["mongodb", "redis", "mysql", "rabbitmq"]
    image_id: ami-0220d79f3f480ecf5
    domain_name: devops90.online
  tasks:
  - name: create ec2 instances
    amazon.aws.ec2_instance:
     instance_type: t3.micro
     name: "roboshop-{{ item }}"
     image_id: "{{ image_id }}"
     region: us-east-1
     security_groups:
     - "roboshop-{{item}}"
     - "roboshop-common"
    loop: "{{ instances}}"
    register: ec2_output

  # - name: print output
  #   debug:
  #     msg: "{{ec2_output }}"   

  # - name: create route53 record
  #   debug:
  #      msg: "Instance Name: {{ item.item }} PrivateIP: {{ item.instances[0].private_ip_address }}"
  #   loop: "{{ ec2_output.results }}"

  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}.{{ domain_name}}"
      ttl: 1
      type: A
      value: "{{ item.instances[0].private_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}" 

  - name: create r53 record for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ domain_name}}"
      ttl: 1
      type: A
      overwrite: true
      value: "{{ item.instances[0].public_ip_address }}"
    loop: "{{ ec2_output.results }}"   
    when: item.item == "frontend"
    