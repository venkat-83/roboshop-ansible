- name: roboshop instances management
  hosts: local
  connection: local
  vars: 
    instances: ["mongodb", "redis", "mysql", "rabbitmq"]
    image_id: ami-0220d79f3f480ecf5
  tasks:
  - name: create ec2 instances
    amazon.aws.ec2_instance:
     instance_type: t3.micro
     name: "roboshop-{{ item }}"
     image_id: "{{ image_id }}"
     region: us-east-1
     security_groups:
     - "roboshop-{{item}}"
     - "roboshop-common"
    loop: "{{ instances}}"
    register: ec2_output

  # - name: print output
  #   debug:
  #     msg: "{{ec2_output }}"   

  - name: create route53 record
    debug:
       msg: "Instance Name: {{ item.item }} PrivateIP: {{ item.instances[0].private_ip_address }}"
    loop: "{{ ec2_output.results }}"